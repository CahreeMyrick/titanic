experiment:
  name: v1
  active_model: xgboost
  mode: all
  target: Survived
  id_column: PassengerId
  random_state: 42

paths:
  train_data: data/train.csv
  test_data: data/test.csv
  outputs_dir: sols

preprocessing:
  drop_columns:
    - Name
    - Ticket
    - Cabin

  numerical:
    - Pclass
    - Age
    - SibSp
    - Parch
    - Fare

  categorical:
    - Sex
    - Embarked

  impute:
    numerical: median
    categorical: most_frequent

  scale:
    enabled: true

  encode:
    enabled: true

models:
  logistic_regression:
    params:
      C: 1.0
      max_iter: 1000
      random_state: 42

  svm:
    params:
      kernel: rbf
      C: 1.0
      gamma: scale
      probability: false

  random_forest:
    params:
      n_estimators: 200
      max_depth: 10
      random_state: 42

  xgboost:
    params:
      n_estimators: 500
      learning_rate: 0.05
      max_depth: 6
      random_state: 42
      eval_metric: logloss

training:
  test_size: 0.2
  stratify: true

outputs:
  save_model: false
  save_predictions: true
