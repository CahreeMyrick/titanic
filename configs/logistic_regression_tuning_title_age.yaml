experiment:
  name: logistic_regression_tuning_title_age
  active_model: logistic_regression
  mode: single
  target: Survived
  id_column: PassengerId
  random_state: 42

paths:
  train_data: data/train.csv
  test_data: data/test.csv
  outputs_dir: sols/logistic_regression_tuning_title_age

preprocessing:
  drop_columns:
    - Name
    - Ticket
    - Cabin

  numerical:
    - Age
    - SibSp
    - Parch
    - Fare

  boolean: []

  categorical:
    - Pclass
    - Sex
    - Embarked
    - Title

  impute:
    numerical: median
    categorical: most_frequent

  scale:
    enabled: true

  encode:
    enabled: true

  engineer_features:
    enabled: true
    features:
      - add_title
      - fill_embarked
      - fill_fare
      - fill_age_by_title_class

models:
  logistic_regression:
    params:
      max_iter: 2000
      random_state: 42

    search_params:
      model__C:
        - 0.001
        - 0.003
        - 0.01
        - 0.03
        - 0.1
        - 0.3
        - 1.0
        - 3.0
        - 10.0
        - 30.0

      model__solver:
        - liblinear
        - lbfgs

      model__class_weight:
        - null
        - balanced

training:
  test_size: 0.2
  stratify: true

  cross_validation:
    enabled: false
    folds: 5
    scoring: accuracy

  hyperparameter_search:
    enabled: true
    method: grid
    folds: 5
    scoring: accuracy
    n_iter: 20
    save: true

outputs:
  save_model: true
  save_predictions: true

  evaluation:
    save: false
    print: false

  cross_validation:
    save: false
    print: false

  hyperparameter_search:
    save: true
    print: true

ensemble:
  enabled: false

  voting:
    enabled: false
    type: soft
    models: []

  stacking:
    enabled: false

  bagging:
    enabled: false
