experiment:
  name: passenger_groups_only
  active_model: logistic_regression
  mode: all
  target: Survived
  id_column: PassengerId
  random_state: 42
paths:
  train_data: data/train.csv
  test_data: data/test.csv
  outputs_dir: sols/passenger_groups_only
preprocessing:
  drop_columns:
  - Name
  - Ticket
  - Cabin
  - Surname
  - FamilyID
  numerical:
  - Age
  - FareLog
  - FamilySize
  - TicketGroupSize
  - FamilyGroupSize
  - FarePerTicket
  boolean:
  - IsAlone
  - HasCabin
  - Child
  - Mother
  - IsAdultMale
  - IsBoy
  - IsFemaleAlone
  categorical:
  - Pclass
  - Sex
  - Embarked
  - Title
  - FamilyGroup
  - PassengerGroup
  - Deck
  impute:
    numerical: median
    boolean: most_frequent
    categorical: most_frequent
  scale:
    enabled: true
  encode:
    enabled: true
  engineer_features:
    enabled: true
    features:
    - add_title
    - fill_embarked
    - fill_fare
    - fill_age_by_title_class
    - add_family_size
    - add_is_alone
    - add_family_group
    - add_surname
    - add_family_id
    - add_ticket_group_size
    - add_family_group_size
    - add_has_cabin
    - add_deck
    - add_fare_log
    - add_fare_per_ticket
    - add_child
    - add_mother
    - add_passenger_group
models:
  logistic_regression:
    params:
      C: 0.3
      max_iter: 2000
      random_state: 42
    search_params:
      model__C:
      - 0.03
      - 0.1
      - 0.3
      - 1.0
      - 3.0
      model__solver:
      - liblinear
      - lbfgs
  random_forest:
    params:
      n_estimators: 500
      max_depth: 6
      min_samples_split: 8
      min_samples_leaf: 3
      max_features: sqrt
      class_weight: null
      random_state: 42
      n_jobs: -1
    search_params:
      model__n_estimators:
      - 300
      - 500
      - 800
      model__max_depth:
      - 4
      - 6
      - 8
      - null
      model__min_samples_leaf:
      - 2
      - 3
      - 5
      model__max_features:
      - sqrt
      - log2
  xgboost:
    params:
      objective: binary:logistic
      eval_metric: logloss
      tree_method: hist
      n_estimators: 250
      learning_rate: 0.03
      max_depth: 3
      min_child_weight: 3
      subsample: 0.8
      colsample_bytree: 0.8
      reg_alpha: 0.1
      reg_lambda: 2.0
      random_state: 42
      n_jobs: 1
      verbosity: 0
    search_params:
      model__n_estimators:
      - 150
      - 250
      - 400
      model__learning_rate:
      - 0.02
      - 0.03
      - 0.05
      model__max_depth:
      - 2
      - 3
      - 4
      model__min_child_weight:
      - 2
      - 3
      - 5
      model__subsample:
      - 0.7
      - 0.8
      - 1.0
      model__colsample_bytree:
      - 0.7
      - 0.8
      - 1.0
training:
  test_size: 0.2
  stratify: true
  cross_validation:
    enabled: true
    folds: 5
    scoring: accuracy
  hyperparameter_search:
    enabled: false
    method: random
    folds: 5
    scoring: accuracy
    n_iter: 50
outputs:
  save_model: false
  save_predictions: true
  evaluation:
    save: false
    print: true
  cross_validation:
    save: true
    print: true
  hyperparameter_search:
    save: true
    print: true
ensemble:
  enabled: false
  voting:
    enabled: false
    type: hard
    models: []
  stacking:
    enabled: false
  bagging:
    enabled: false
