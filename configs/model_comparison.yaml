experiment:
  name: model_comparison_title_age
  active_model: logistic_regression
  mode: all
  target: Survived
  id_column: PassengerId
  random_state: 42

paths:
  train_data: data/train.csv
  test_data: data/test.csv
  outputs_dir: sols/model_comparison_title_age

preprocessing:
  drop_columns:
    - Name
    - Ticket
    - Cabin

  numerical:
    - Age
    - SibSp
    - Parch
    - Fare

  boolean: []

  categorical:
    - Pclass
    - Sex
    - Embarked
    - Title

  impute:
    numerical: median
    categorical: most_frequent

  scale:
    enabled: true

  encode:
    enabled: true

  engineer_features:
    enabled: true
    features:
      - add_title
      - fill_embarked
      - fill_fare
      - fill_age_by_title_class

models:
  logistic_regression:
    params:
      C: 1.0
      max_iter: 1000
      random_state: 42

    search_params:
      model__C: [0.01, 0.1, 1.0, 10.0]
      model__solver: [liblinear, lbfgs]

  svm:
    params:
      kernel: rbf
      C: 1.0
      gamma: scale
      probability: false
      random_state: 42

    search_params:
      model__C: [0.1, 1.0, 10.0]
      model__kernel: [linear, rbf]
      model__gamma: [scale, auto]

  random_forest:
    params:
      n_estimators: 300
      max_depth: 8
      min_samples_split: 5
      random_state: 42
      n_jobs: -1

    search_params:
      model__n_estimators: [100, 300, 500]
      model__max_depth: [4, 6, 8, 10, null]
      model__min_samples_split: [2, 5, 10]
      model__min_samples_leaf: [1, 2, 4]

  xgboost:
    params:
      n_estimators: 300
      learning_rate: 0.05
      max_depth: 4
      min_child_weight: 2
      subsample: 0.8
      colsample_bytree: 0.8
      random_state: 42
      eval_metric: logloss
      n_jobs: -1

    search_params:
      model__n_estimators: [100, 300, 500]
      model__learning_rate: [0.01, 0.05, 0.1]
      model__max_depth: [3, 4, 5, 7]

training:
  test_size: 0.2
  stratify: true

  cross_validation:
    enabled: true
    folds: 5
    scoring: accuracy

  hyperparameter_search:
    enabled: false
    method: grid
    folds: 5
    scoring: accuracy
    n_iter: 20

outputs:
  save_model: false
  save_predictions: false

  evaluation:
    save: false
    print: false

  cross_validation:
    save: true
    print: true

  hyperparameter_search:
    save: false
    print: false

ensemble:
  enabled: false

  voting:
    enabled: false
    type: soft
    models: []

  stacking:
    enabled: false

  bagging:
    enabled: false
